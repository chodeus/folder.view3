name: Release Beta

on:
  workflow_dispatch:

jobs:
  beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout beta
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: beta
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # pkg_build.sh --beta auto-increments the .N hotfix number from the existing
      # archives and emits folder.view3-YYYY.MM.DD.N-x86_64-1.txz with beta URLs.
      - name: Build beta package
        run: |
          chmod +x pkg_build.sh
          bash pkg_build.sh --beta

      - name: Extract beta version
        id: beta
        run: |
          VERSION=$(grep -oP '<!ENTITY version "\K[^"]+' folder.view3.plg)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          FILENAME="folder.view3-${VERSION}-x86_64-1.txz"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "Beta version: $VERSION"

      - name: Verify build
        run: |
          VERSION="${{ steps.beta.outputs.version }}"
          FILENAME="archive/folder.view3-${VERSION}-x86_64-1.txz"

          if [ ! -f "$FILENAME" ]; then
            echo "ERROR: Expected $FILENAME not found"
            ls -la archive/
            exit 1
          fi

          echo "Package: $FILENAME (plg version $VERSION)"

      - name: Commit and push to beta
        run: |
          git add archive/ folder.view3.plg
          git commit -m "Build beta ${{ steps.beta.outputs.version }}"
          git push origin beta
