name: Release Main

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Remove today's packages to avoid collision detection in pkg_build.sh
      - name: Clean existing packages for today
        run: |
          TODAY=$(date +"%Y.%m.%d")
          rm -f archive/folder.view3-${TODAY}*.txz
          echo "Cleaned packages for $TODAY"

      - name: Build stable package
        run: |
          chmod +x pkg_build.sh
          bash pkg_build.sh

      - name: Extract stable version
        id: version
        run: |
          VERSION=$(grep -oP '<!ENTITY version "\K[^"]+' folder.view3.plg)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          FILENAME="folder.view3-${VERSION}-x86_64-1.txz"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "Stable version: $VERSION"

      - name: Commit stable release to main
        run: |
          git add -A
          git commit -m "Stable release ${{ steps.version.outputs.version }}"

      - name: Push main
        run: git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## FolderView3 v${{ steps.version.outputs.version }}

            Install URL: `https://raw.githubusercontent.com/chodeus/folder.view3/main/folder.view3.plg`

            See [CHANGELOG-fixes.md](CHANGELOG-fixes.md) for detailed changes.
          files: archive/${{ steps.version.outputs.filename }}
          draft: false
          prerelease: false
